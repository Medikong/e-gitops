apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-external-secret-readiness
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-external-secret-readiness
  namespace: monitoring
rules:
  - apiGroups:
      - external-secrets.io
    resources:
      - externalsecrets
      - secretstores
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - grafana-admin-credentials
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-external-secret-readiness
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-external-secret-readiness
subjects:
  - kind: ServiceAccount
    name: grafana-external-secret-readiness
    namespace: monitoring
