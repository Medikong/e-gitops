apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-external-secret-readiness
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-external-secret-readiness
        app.kubernetes.io/part-of: dropmong-platform
    spec:
      automountServiceAccountToken: true
      nodeSelector:
        medikong.io/workload: platform
      restartPolicy: Never
      serviceAccountName: grafana-external-secret-readiness
      containers:
        - name: wait
          image: registry.k8s.io/kubectl:v1.34.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              kubectl wait --for=condition=Ready secretstore/aws-secrets-manager --namespace=monitoring --timeout=240s
              kubectl wait --for=condition=Ready externalsecret/grafana-admin-credentials --namespace=monitoring --timeout=240s
              kubectl get secret grafana-admin-credentials --namespace=monitoring --output=name >/dev/null
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
