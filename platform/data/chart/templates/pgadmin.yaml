apiVersion: v1
kind: Secret
metadata:
  name: pgadmin-local-credentials
  namespace: dropmong-payment
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: pgadmin
type: Opaque
stringData:
  PGADMIN_DEFAULT_EMAIL: admin@example.com
  PGADMIN_DEFAULT_PASSWORD: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-local-servers
  namespace: dropmong-payment
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: pgadmin
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "auth-db",
          "Group": "Medikong Local",
          "Host": "auth-db.dropmong-auth.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "auth_db",
          "Username": "user",
          "SSLMode": "prefer"
        },
        "2": {
          "Name": "payment-db",
          "Group": "Medikong Local",
          "Host": "payment-db.dropmong-payment.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "payment_db",
          "Username": "user",
          "SSLMode": "prefer"
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: dropmong-payment
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: pgadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: pgadmin
    spec:
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8.14
          ports:
            - name: http
              containerPort: 80
          env:
            - name: SCRIPT_NAME
              value: /pgadmin
            - name: PGADMIN_LISTEN_PORT
              value: "80"
            - name: PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED
              value: "False"
            - name: PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION
              value: "False"
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: pgadmin-local-credentials
                  key: PGADMIN_DEFAULT_EMAIL
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgadmin-local-credentials
                  key: PGADMIN_DEFAULT_PASSWORD
          readinessProbe:
            httpGet:
              path: /pgadmin/misc/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: servers
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
            - name: data
              mountPath: /var/lib/pgadmin
      volumes:
        - name: servers
          configMap:
            name: pgadmin-local-servers
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: dropmong-payment
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: pgadmin
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pgadmin
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pgadmin
  namespace: dropmong-payment
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: pgadmin
  annotations:
    konghq.com/protocols: http
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /pgadmin
            pathType: Prefix
            backend:
              service:
                name: pgadmin
                port:
                  number: 80
