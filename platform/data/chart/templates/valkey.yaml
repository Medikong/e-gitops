{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.valkey.name | quote }}
  namespace: {{ .Values.valkey.namespace | quote }}
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: {{ .Values.valkey.name | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Values.valkey.name | quote }}
  ports:
    - name: redis
      port: {{ .Values.valkey.port }}
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.valkey.name | quote }}
  namespace: {{ .Values.valkey.namespace | quote }}
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: {{ .Values.valkey.name | quote }}
spec:
  serviceName: {{ .Values.valkey.name | quote }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.valkey.name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: {{ .Values.valkey.name | quote }}
    spec:
{{- with .Values.valkey.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: valkey
          image: {{ .Values.valkey.image | quote }}
{{- if .Values.valkey.auth.enabled }}
          command:
            - sh
            - -ec
            - exec valkey-server --appendonly yes --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.valkey.auth.secretName | quote }}
                  key: {{ .Values.valkey.auth.passwordKey | quote }}
{{- else }}
          args:
            - valkey-server
            - --appendonly
            - "yes"
{{- end }}
          ports:
            - name: redis
              containerPort: {{ .Values.valkey.port }}
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
{{- if .Values.valkey.auth.enabled }}
                - REDISCLI_AUTH="$REDIS_PASSWORD" valkey-cli ping 2>/dev/null | grep -qx PONG
{{- else }}
                - valkey-cli ping | grep -qx PONG
{{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
{{- if .Values.valkey.auth.enabled }}
                - REDISCLI_AUTH="$REDIS_PASSWORD" valkey-cli ping 2>/dev/null | grep -qx PONG
{{- else }}
                - valkey-cli ping | grep -qx PONG
{{- end }}
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
{{ toYaml .Values.valkey.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
{{- if .Values.valkey.storageClassName }}
        storageClassName: {{ .Values.valkey.storageClassName | quote }}
{{- end }}
        resources:
          requests:
            storage: {{ .Values.valkey.storage }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ default (printf "allow-%s-ingress" .Values.valkey.name) .Values.valkey.networkPolicyName | quote }}
  namespace: {{ .Values.valkey.namespace | quote }}
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: {{ .Values.valkey.name | quote }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.valkey.name | quote }}
  policyTypes:
    - Ingress
  ingress:
    - from:
{{ range .Values.valkey.allowedPodSelectors }}
        - podSelector:
{{ toYaml . | nindent 12 }}
{{ end }}
{{- with .Values.valkey.allowedPeers }}
{{ toYaml . | nindent 8 }}
{{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.valkey.port }}
{{- end }}
