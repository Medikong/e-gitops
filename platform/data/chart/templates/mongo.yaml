apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongodb.name | quote }}
  namespace: {{ .Values.mongodb.namespace | quote }}
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: {{ .Values.mongodb.name | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Values.mongodb.name | quote }}
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.mongodb.name | quote }}
  namespace: {{ .Values.mongodb.namespace | quote }}
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: {{ .Values.mongodb.name | quote }}
spec:
  serviceName: {{ .Values.mongodb.name | quote }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.mongodb.name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: {{ .Values.mongodb.name | quote }}
    spec:
      containers:
        - name: mongo
          image: {{ .Values.mongodb.image | quote }}
          ports:
            - name: mongo
              containerPort: 27017
          readinessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
{{ toYaml .Values.mongodb.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.mongodb.storage }}
