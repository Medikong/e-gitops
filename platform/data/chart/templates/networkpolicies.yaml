apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-db-ingress
  namespace: dropmong-auth
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: auth-db
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: auth-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
        - podSelector:
            matchLabels:
              app: auth-service-worker
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dropmong-payment
          podSelector:
            matchLabels:
              app.kubernetes.io/name: pgadmin
      ports:
        - protocol: TCP
          port: 5432
{{- if .Values.postgresql.exporter.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.postgresql.exporter.port }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-payment-db-ingress
  namespace: dropmong-payment
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: payment-db
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payment-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: payment-service
        - podSelector:
            matchLabels:
              app: payment-service-background
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pgadmin
      ports:
        - protocol: TCP
          port: 5432
{{- if .Values.postgresql.exporter.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.postgresql.exporter.port }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
  namespace: dropmong-messaging
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: kafka
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - dropmong-payment
                  - dropmong-notification
                  - dropmong-order
                  - dropmong-interest
          podSelector:
            matchExpressions:
              - key: dropmong.io/service
                operator: In
                values:
                  - payment
                  - notification
                  - order
                  - interest
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka-create-topics
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pgadmin-runtime
  namespace: dropmong-payment
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: pgadmin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - dropmong-auth
                  - dropmong-payment
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - auth-db
                  - payment-db
      ports:
        - protocol: TCP
          port: 5432
