profile: aws-dev

postgresql:
  config:
    sharedBuffers: 256MB
    effectiveCacheSize: 1GB
    workMem: 16MB
    maintenanceWorkMem: 256MB
    maxConnections: 300
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage: 10Gi
  storageClassName: medikong-aws-gp3
