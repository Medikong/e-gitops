apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../monitoring

patches:
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: grafana
      namespace: monitoring
    patch: |-
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: grafana
        namespace: monitoring
