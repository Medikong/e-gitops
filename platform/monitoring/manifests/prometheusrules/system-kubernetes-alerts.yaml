apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dropmong-system-kubernetes-alerts
  labels:
    app.kubernetes.io/name: dropmong-system-kubernetes-alerts
    app.kubernetes.io/part-of: dropmong-platform
    release: kube-prometheus-stack
spec:
  groups:
    - name: dropmong.system.kubernetes
      rules:
        - alert: DropMongDeploymentReplicasUnavailable
          expr: |
            sum by (namespace, deployment) (
              kube_deployment_spec_replicas{namespace=~"dropmong-(auth|user|catalog|coupon|interest|order|payment|notification|web)|monitoring|observability"}
              - kube_deployment_status_replicas_available{namespace=~"dropmong-(auth|user|catalog|coupon|interest|order|payment|notification|web)|monitoring|observability"}
            ) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment has unavailable replicas"
            description: "{{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas for more than 10 minutes."
            runbook_url: "https://github.com/Medikong/e-gitops/blob/main/platform/monitoring/runbooks/README.md#dropmongdeploymentreplicasunavailable"
        - alert: DropMongPodOOMKilled
          expr: |
            max by (namespace, pod, container) (
              kube_pod_container_status_last_terminated_reason{
                namespace=~"dropmong-(auth|user|catalog|coupon|interest|order|payment|notification|web)|monitoring|observability",
                reason="OOMKilled",
                container!="",
                pod!=""
              } == 1
            ) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Container was OOMKilled"
            description: "{{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} last terminated with OOMKilled."
            runbook_url: "https://github.com/Medikong/e-gitops/blob/main/platform/monitoring/runbooks/README.md#dropmongpodoomkilled"
        - alert: DropMongContainerCpuThrottlingHigh
          expr: |
            100 *
            sum by (namespace, pod, container) (
              rate(container_cpu_cfs_throttled_periods_total{
                namespace=~"dropmong-(auth|user|catalog|coupon|interest|order|payment|notification|web)|monitoring|observability",
                container!="",
                container!="POD",
                pod!="",
                image!=""
              }[5m])
            )
            /
            clamp_min(
              sum by (namespace, pod, container) (
                rate(container_cpu_cfs_periods_total{
                  namespace=~"dropmong-(auth|user|catalog|coupon|interest|order|payment|notification|web)|monitoring|observability",
                  container!="",
                  container!="POD",
                  pod!="",
                  image!=""
                }[5m])
              ),
              0.001
            ) > 25
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Container CPU throttling is high"
            description: "{{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} CPU throttling ratio is above 25% for more than 15 minutes."
            runbook_url: "https://github.com/Medikong/e-gitops/blob/main/platform/monitoring/runbooks/README.md#dropmongcontainercputhrottlinghigh"
        - alert: DropMongNodeMemoryPressure
          expr: |
            max by (node) (
              kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
            ) > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Node reports MemoryPressure"
            description: "{{ $labels.node }} reports MemoryPressure for more than 10 minutes."
            runbook_url: "https://github.com/Medikong/e-gitops/blob/main/platform/monitoring/runbooks/README.md#dropmongnodememorypressure"
