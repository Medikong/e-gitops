crds:
  enabled: true

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'discord'
    receivers:
    - name: 'discord'
      webhook_configs:
      - url: 'http://alertmanager-discord.monitoring.svc.cluster.local:9094/'
        send_resolved: true
  alertmanagerSpec:
    replicas: 1
    nodeSelector:
      medikong.io/workload: observability
    tolerations:
      - key: medikong.io/workload
        operator: Equal
        value: observability
        effect: NoSchedule
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

defaultRules:
  create: true

grafana:
  enabled: true
  grafana.ini:
    server:
      serve_from_sub_path: false
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  image:
    registry: docker.io
    repository: grafana/grafana
    tag: "13.0.1"
  initChownData:
    image:
      registry: docker.io
      repository: library/busybox
      tag: "1.37.0"
  deploymentStrategy:
    type: Recreate
  sidecar:
    image:
      registry: quay.io
      repository: kiwigrid/k8s-sidecar
      tag: 2.7.3
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
      provider:
        allowUiUpdates: false
        disableDelete: false
        foldersFromFilesStructure: true
  additionalDataSources:
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo.observability.svc.cluster.local:3200
      isDefault: false
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-5m"
          spanEndTimeShift: "5m"
          filterByTraceID: true
          filterBySpanID: false
          tags:
            - key: service.name
              value: service_name
            - key: deployment.environment
              value: deployment_environment
        tracesToProfiles:
          datasourceUid: pyroscope
          tags:
            - key: service.name
              value: service
          profileTypeId: process_cpu:cpu:nanoseconds:cpu:nanoseconds
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      isDefault: false
      jsonData:
        maxLines: 1000
        derivedFields:
          - name: trace_id
            matcherRegex: '"trace_id"\s*:\s*"([a-fA-F0-9]{32})"'
            datasourceUid: tempo
            url: '$${__value.raw}'
    - name: Pyroscope
      uid: pyroscope
      type: grafana-pyroscope-datasource
      access: proxy
      url: http://pyroscope.observability.svc.cluster.local:4040
      isDefault: false
  persistence:
    enabled: true
    type: pvc
    storageClassName: medikong-aws-gp3
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 1Gi
  nodeSelector:
    medikong.io/workload: observability
  tolerations:
    - key: medikong.io/workload
      operator: Equal
      value: observability
      effect: NoSchedule

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 30d
    retentionSize: 20GB
    serviceMonitorSelector:
      matchLabels:
        release: kube-prometheus-stack
    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - observability
            - dropmong-auth
            - dropmong-catalog
            - dropmong-coupon
            - dropmong-interest
            - dropmong-notification
            - dropmong-order
            - dropmong-payment
            - dropmong-user
            - dropmong-web
    podMonitorSelector:
      matchLabels:
        release: kube-prometheus-stack
    podMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - observability
            - dropmong-auth
            - dropmong-catalog
            - dropmong-coupon
            - dropmong-interest
            - dropmong-notification
            - dropmong-order
            - dropmong-payment
            - dropmong-user
            - dropmong-web
    ruleSelector:
      matchLabels:
        release: kube-prometheus-stack
    ruleNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - dropmong-auth
            - dropmong-catalog
            - dropmong-coupon
            - dropmong-interest
            - dropmong-notification
            - dropmong-order
            - dropmong-payment
            - dropmong-user
            - dropmong-web
    image:
      registry: quay.io
      repository: prometheus/prometheus
      tag: v3.11.3-distroless
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: medikong-aws-gp3
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi
    nodeSelector:
      medikong.io/workload: observability
    tolerations:
      - key: medikong.io/workload
        operator: Equal
        value: observability
        effect: NoSchedule

prometheusOperator:
  image:
    registry: quay.io
    repository: prometheus-operator/prometheus-operator
    tag: v0.90.1
  prometheusConfigReloader:
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.90.1
  admissionWebhooks:
    patch:
      image:
        registry: ghcr.io
        repository: jkroepke/kube-webhook-certgen
        tag: 1.8.2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector:
    medikong.io/workload: observability
  tolerations:
    - key: medikong.io/workload
      operator: Equal
      value: observability
      effect: NoSchedule

kube-state-metrics:
  image:
    registry: registry.k8s.io
    repository: kube-state-metrics/kube-state-metrics
    tag: v2.18.0
  metricLabelsAllowlist:
    - nodes=[role]
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  nodeSelector:
    medikong.io/workload: observability
  tolerations:
    - key: medikong.io/workload
      operator: Equal
      value: observability
      effect: NoSchedule

prometheus-node-exporter:
  image:
    registry: quay.io
    repository: prometheus/node-exporter
    tag: v1.11.1
    distroless: true
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

additionalManifests:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: alertmanager-discord
      namespace: monitoring
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: alertmanager-discord
      template:
        metadata:
          labels:
            app: alertmanager-discord
        spec:
          containers:
          - name: alertmanager-discord
            image: benjojo/alertmanager-discord:latest
            ports:
            - containerPort: 9094
            env:
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: alertmanager-discord-webhook
                  key: webhook-url
                  optional: false
  - apiVersion: v1
    kind: Service
    metadata:
      name: alertmanager-discord
      namespace: monitoring
    spec:
      selector:
        app: alertmanager-discord
      ports:
      - port: 9094
        targetPort: 9094
        name: http
