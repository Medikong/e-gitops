                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "max by (service_name) (service_ready{service_environment=~\"$environment\"})",
                    "legendFormat": "{{service_name}} ready",
                    "range": true,
                    "refId": "A"
                  },
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "max by (namespace, service) (service_dependency_up)",
                    "legendFormat": "{{namespace}}/{{service}} dependency",
                    "range": true,
