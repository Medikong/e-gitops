  additionalDataSources:
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo.observability.svc.cluster.local:3200
      isDefault: false
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-5m"
          spanEndTimeShift: "5m"
          filterByTraceID: true
          filterBySpanID: false
          tags:
            - key: service.name
              value: service_name
            - key: deployment.environment
              value: deployment_environment
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      isDefault: false
      jsonData:
        maxLines: 1000
        derivedFields:
          - name: trace_id
            matcherRegex: '"trace_id"\s*:\s*"([a-fA-F0-9]{32})"'
            datasourceUid: tempo
            url: '$${__value.raw}'
  persistence:
    enabled: true
    type: pvc
    storageClassName: medikong-aws-gp3
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
  # aws-dev 3-node cluster currently has no dedicated platform worker.
  # Keep this empty temporarily so the scheduler can place Grafana on available workers.
  nodeSelector: {}

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 30d
    retentionSize: 20GB
    serviceMonitorSelector:
      matchLabels:
        release: kube-prometheus-stack
    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - observability
            - ticketing-auth
            - ticketing-concert
            - ticketing-notification
            - ticketing-payment
            - ticketing-reservation
            - ticketing-ticket
    podMonitorSelector:
      matchLabels:
        release: kube-prometheus-stack
    podMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - observability
            - ticketing-auth
            - ticketing-concert
            - ticketing-notification
            - ticketing-payment
            - ticketing-reservation
            - ticketing-ticket
    ruleSelector:
      matchLabels:
        release: kube-prometheus-stack
    ruleNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - ticketing-auth
            - ticketing-concert
            - ticketing-notification
            - ticketing-payment
            - ticketing-reservation
            - ticketing-ticket
    image:
      registry: quay.io
      repository: prometheus/prometheus
      tag: v3.11.3-distroless
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: medikong-aws-gp3
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi
    # aws-dev 3-node cluster currently has no dedicated platform worker.
    # Keep this empty temporarily so the scheduler can place Prometheus on available workers.
    nodeSelector: {}

prometheusOperator:
  image:
    registry: quay.io
    repository: prometheus-operator/prometheus-operator
    tag: v0.90.1
  prometheusConfigReloader:
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.90.1
  admissionWebhooks:
    patch:
      image:
        registry: ghcr.io
        repository: jkroepke/kube-webhook-certgen
        tag: 1.8.2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # aws-dev 3-node cluster currently has no dedicated platform worker.
  # Keep this empty temporarily so the scheduler can place the operator on available workers.
  nodeSelector: {}

kube-state-metrics:
  image:
    registry: registry.k8s.io
    repository: kube-state-metrics/kube-state-metrics
    tag: v2.18.0
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # aws-dev 3-node cluster currently has no dedicated platform worker.
  # Keep this empty temporarily so the scheduler can place kube-state-metrics on available workers.
  nodeSelector: {}

prometheus-node-exporter:
  image:
    registry: quay.io
    repository: prometheus/node-exporter
    tag: v1.11.1
    distroless: true
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
