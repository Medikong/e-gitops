crds:
  enabled: true

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    # aws-dev 3-node cluster currently has no dedicated platform worker.
    # Keep this empty temporarily so the scheduler can place Alertmanager on available workers.
    nodeSelector: {}
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

defaultRules:
  create: true

grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  image:
    registry: docker.io
    repository: grafana/grafana
    tag: "13.0.1"
  initChownData:
    image:
      registry: docker.io
      repository: library/busybox
      tag: "1.37.0"
  sidecar:
    image:
      registry: quay.io
      repository: kiwigrid/k8s-sidecar
      tag: 2.7.3
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
      provider:
        allowUiUpdates: false
        disableDelete: false
        foldersFromFilesStructure: true
  dashboards:
    default:
      00-service-metrics-overview:
        json: |
          {
            "uid": "medikong-service-metrics-overview",
            "title": "00 Service Metrics Overview",
            "tags": [
              "medikong",
              "services",
              "metrics",
              "overview"
            ],
            "timezone": "browser",
            "schemaVersion": 41,
            "version": 1,
            "refresh": "30s",
            "time": {
              "from": "now-1h",
              "to": "now"
            },
            "templating": {
              "list": [
                {
                  "name": "environment",
                  "label": "Environment",
                  "type": "query",
                  "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                  },
                  "query": "label_values(service_ready, service_environment)",
                  "definition": "label_values(service_ready, service_environment)",
                  "refresh": 1,
                  "includeAll": true,
                  "multi": true,
                  "current": {
                    "selected": true,
                    "text": "All",
                    "value": "$__all"
                  }
                }
              ]
            },
            "panels": [
              {
                "id": 1,
                "title": "1. Request Rate by Service",
                "type": "timeseries",
                "datasource": {
                  "type": "prometheus",
                  "uid": "prometheus"
                },
                "gridPos": {
                  "x": 0,
                  "y": 0,
                  "w": 12,
                  "h": 7
                },
                "fieldConfig": {
                  "defaults": {
                    "unit": "reqps"
                  },
                  "overrides": []
                },
                "targets": [
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "sum by (service_name) (rate(http_server_request_duration_seconds_count{service_environment=~\"$environment\"}[$__rate_interval]))",
                    "legendFormat": "{{service_name}}",
                    "range": true,
                    "refId": "A"
                  }
                ],
                "options": {
                  "legend": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "displayMode": "table",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "mode": "multi",
                    "sort": "desc"
                  }
                }
              },
              {
                "id": 2,
                "title": "2. 5xx Error Rate by Service",
                "type": "timeseries",
                "datasource": {
                  "type": "prometheus",
                  "uid": "prometheus"
                },
                "gridPos": {
                  "x": 12,
                  "y": 0,
                  "w": 12,
                  "h": 7
                },
                "fieldConfig": {
                  "defaults": {
                    "unit": "percent"
                  },
                  "overrides": []
                },
                "targets": [
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "100 * sum by (service_name) (rate(http_server_request_duration_seconds_count{service_environment=~\"$environment\",http_response_status_code=~\"5..\"}[$__rate_interval])) / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_environment=~\"$environment\"}[$__rate_interval])), 0.001)",
                    "legendFormat": "{{service_name}}",
                    "range": true,
                    "refId": "A"
                  }
                ],
                "options": {
                  "legend": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "displayMode": "table",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "mode": "multi",
                    "sort": "desc"
                  }
                }
              },
              {
                "id": 3,
                "title": "3. p95 Latency by Service",
                "type": "timeseries",
                "datasource": {
                  "type": "prometheus",
                  "uid": "prometheus"
                },
                "gridPos": {
                  "x": 0,
                  "y": 7,
                  "w": 24,
                  "h": 7
                },
                "fieldConfig": {
                  "defaults": {
                    "unit": "s"
                  },
                  "overrides": []
                },
                "targets": [
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "histogram_quantile(0.95, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_environment=~\"$environment\"}[$__rate_interval])))",
                    "legendFormat": "{{service_name}}",
                    "range": true,
                    "refId": "A"
                  }
                ],
                "options": {
                  "legend": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "displayMode": "table",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "mode": "multi",
                    "sort": "desc"
                  }
                }
              },
              {
                "id": 4,
                "title": "4. Payment Success Rate",
                "type": "timeseries",
                "datasource": {
                  "type": "prometheus",
                  "uid": "prometheus"
                },
                "gridPos": {
                  "x": 0,
                  "y": 14,
                  "w": 12,
                  "h": 7
                },
                "fieldConfig": {
                  "defaults": {
                    "unit": "percent"
                  },
                  "overrides": []
                },
                "targets": [
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "100 * sum(rate(payments_total{service_name=\"payment-service\",service_environment=~\"$environment\",result=\"success\"}[$__rate_interval])) / clamp_min(sum(rate(payments_total{service_name=\"payment-service\",service_environment=~\"$environment\"}[$__rate_interval])), 0.001)",
                    "legendFormat": "success rate",
                    "range": true,
                    "refId": "A"
                  }
                ],
                "options": {
                  "legend": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "displayMode": "table",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "mode": "multi",
                    "sort": "desc"
                  }
                }
              },
              {
                "id": 5,
                "title": "5. Reservation Result and Rejection Rate",
                "type": "timeseries",
                "datasource": {
                  "type": "prometheus",
                  "uid": "prometheus"
                },
                "gridPos": {
                  "x": 12,
                  "y": 14,
                  "w": 12,
                  "h": 7
                },
                "fieldConfig": {
                  "defaults": {
                    "unit": "short"
                  },
                  "overrides": []
                },
                "targets": [
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "sum by (result) (rate(reservations_total{service_name=\"reservation-service\",service_environment=~\"$environment\"}[$__rate_interval]))",
                    "legendFormat": "{{result}}",
                    "range": true,
                    "refId": "A"
                  },
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "100 * sum(rate(reservations_total{service_name=\"reservation-service\",service_environment=~\"$environment\",result=\"rejection\"}[$__rate_interval])) / clamp_min(sum(rate(reservations_total{service_name=\"reservation-service\",service_environment=~\"$environment\"}[$__rate_interval])), 0.001)",
                    "legendFormat": "rejection rate",
                    "range": true,
                    "refId": "B"
                  }
                ],
                "options": {
                  "legend": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "displayMode": "table",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "mode": "multi",
                    "sort": "desc"
                  }
                }
              },
              {
                "id": 6,
                "title": "6. Ticket Issue Success and Duplicate Rate",
                "type": "timeseries",
                "datasource": {
                  "type": "prometheus",
                  "uid": "prometheus"
                },
                "gridPos": {
                  "x": 0,
                  "y": 21,
                  "w": 12,
                  "h": 7
                },
                "fieldConfig": {
                  "defaults": {
                    "unit": "percent"
                  },
                  "overrides": []
                },
                "targets": [
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "prometheus"
                    },
                    "editorMode": "code",
                    "expr": "100 * sum(rate(tickets_issued_total{service_name=\"ticket-service\",service_environment=~\"$environment\",result=\"success\"}[$__rate_interval])) / clamp_min(sum(rate(tickets_issued_total{service_name=\"ticket-service\",service_environment=~\"$environment\"}[$__rate_interval])), 0.001)",
                    "legendFormat": "success rate",
                    "range": true,
                    "refId": "A"
                  },
                  {
                    "datasource": {
                      "type": "prometheus",
