mode: daemonset
fullnameOverride: opentelemetry-collector

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.153.0
  pullPolicy: IfNotPresent

command:
  name: otelcol-contrib

serviceAccount:
  create: true
  automountServiceAccountToken: false

replicaCount: 1

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: null
    protocol: TCP
    appProtocol: grpc
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: null
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

alternateConfig:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    filelog/kubernetes:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/observability_opentelemetry-collector-*/*/*.log
      start_at: end
      include_file_path: true
      operators:
        - type: container
          id: container-parser
        - type: json_parser
          id: parse-json-body
          if: body matches "^\\{"
          parse_from: body
          parse_to: attributes
        - type: regex_parser
          id: parse-kubernetes-log-path
          parse_from: attributes["log.file.path"]
          regex: '^/var/log/pods/(?P<k8s_namespace>[^_]+)_(?P<k8s_pod>[^_]+)_(?P<k8s_pod_uid>[^/]+)/(?P<k8s_container>[^/]+)/(?P<k8s_restart_count>\d+)\.log$'
  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 20
    transform/log_context:
      error_mode: ignore
      log_statements:
        - context: log
          statements:
            - set(resource.attributes["service.name"], attributes["service.name"]) where attributes["service.name"] != nil
            - set(resource.attributes["service.version"], attributes["service.version"]) where attributes["service.version"] != nil
            - set(resource.attributes["deployment.environment.name"], attributes["service.environment"]) where attributes["service.environment"] != nil
            - set(resource.attributes["k8s.namespace.name"], attributes["k8s_namespace"]) where attributes["k8s_namespace"] != nil
            - set(resource.attributes["k8s.pod.name"], attributes["k8s_pod"]) where attributes["k8s_pod"] != nil
            - set(resource.attributes["k8s.container.name"], attributes["k8s_container"]) where attributes["k8s_container"] != nil
            - set(severity_text, attributes["severity_text"]) where attributes["severity_text"] != nil
    filter/drop_probe_success:
      error_mode: ignore
      logs:
        log_record:
          - attributes["event"] == "http.request.completed" and attributes["log.policy"] == "drop"
    batch:
      timeout: 5s
      send_batch_size: 8192
  exporters:
    otlp/tempo:
      endpoint: tempo.observability.svc.cluster.local:4317
      tls:
        insecure: true
    otlphttp/loki:
      endpoint: http://loki.observability.svc.cluster.local:3100/otlp
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
  service:
    extensions:
      - health_check
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - otlp/tempo
      logs:
        receivers:
          - filelog/kubernetes
        processors:
          - memory_limiter
          - transform/log_context
          - filter/drop_probe_success
          - batch
        exporters:
          - otlphttp/loki

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
  extraLabels:
    release: kube-prometheus-stack

service:
  enabled: true

podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

podLabels:
  app.kubernetes.io/part-of: medikong
  app.kubernetes.io/component: trace-log-collector

extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

extraManifests:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: opentelemetry-collector-trace-pipeline
      namespace: observability
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/component: trace-log-collector
    spec:
      podSelector:
        matchLabels:
          app.kubernetes.io/name: opentelemetry-collector
      policyTypes:
        - Ingress
        - Egress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  app.kubernetes.io/part-of: medikong
              podSelector:
                matchLabels:
                  ticketing.io/tier: api
          ports:
            - protocol: TCP
              port: 4317
            - protocol: TCP
              port: 4318
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: monitoring
          ports:
            - protocol: TCP
              port: 8888
      egress:
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: tempo
                  app.kubernetes.io/instance: tempo
          ports:
            - protocol: TCP
              port: 4317
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: loki
                  app.kubernetes.io/instance: loki
          ports:
            - protocol: TCP
              port: 3100
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
          ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53
