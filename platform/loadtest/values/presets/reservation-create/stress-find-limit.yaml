loadtest:
  scenario: reservation-create-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: stress-find-limit
  mau: ""
  stickiness: ""
  peakParticipationRate: ""
  peakWindowMinutes: ""
  journeysPerUser: ""
  safetyFactor: ""
  targetTicketsPerCustomer: ""
  calculatedJourneyRate: ""
  expectedJourneys: 5100

dataset:
  profile: reservation-create
  revision: reservation-create-stress-v1
  concerts: 40
  performancesPerConcert: 3
  seatSections: 1
  seatRows: 10
  seatsPerRow: 30
  customerPool:
    size: 500
    revision: reservation-create-stress-v1

scenarios:
  reservationCreate:
    requestPrefix: loadtest-reservation-create-stress
    executor: ramping-arrival-rate
    rate: 5
    timeUnit: 1s
    preAllocatedVUs: 80
    maxVUs: 250
    duration: 6m
    stages:
      - duration: 1m
        target: 5
      - duration: 2m
        target: 10
      - duration: 3m
        target: 20
    thinkTimeSeconds: 0
    activeCustomerCount: 500
    maxSeatAttempts: 3
    concertLimit: 200
    performanceLimit: 200
    seatLimit: 300
    seatCandidateCount: 300
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "1000"
      httpReqDurationP99Ms: "2000"
      checksRate: "0.99"
      handledRate: "0.99"
      createdRate: "0.99"
      infraFailureRate: "0.01"
