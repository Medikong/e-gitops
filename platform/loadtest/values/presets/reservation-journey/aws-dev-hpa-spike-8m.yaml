loadtest:
  scenario: reservation-journey-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: aws-dev-hpa-spike-8m
  mau: ""
  stickiness: ""
  peakParticipationRate: ""
  peakWindowMinutes: 8
  journeysPerUser: 1
  safetyFactor: ""
  targetTicketsPerCustomer: 100
  calculatedJourneyRate: 40
  expectedJourneys: 13650

scaleOutReport:
  pollEveryIterations: 50

dataset:
  profile: reservation-journey
  revision: reservation-hpa-spike-v1
  concerts: 40
  performancesPerConcert: 3
  customerPool:
    size: 200
    revision: reservation-hpa-spike-v1

scenarios:
  reservationJourney:
    requestPrefix: loadtest-reservation-hpa-spike
    executor: ramping-arrival-rate
    rate: 5
    timeUnit: 1s
    preAllocatedVUs: 160
    maxVUs: 500
    duration: 8m
    stages:
      - duration: 1m
        target: 5
      - duration: 1m
        target: 25
      - duration: 4m
        target: 40
      - duration: 2m
        target: 40
    thinkTimeSeconds: 0
    ticketListLimit: 20
    ticketListMaxPages: 5
    activeCustomerCount: 200
    maxSeatAttempts: 3
    concertLimit: 200
    performanceLimit: 200
    seatLimit: 300
    thresholds:
      httpReqFailedRate: "0.03"
      httpReqDurationP95Ms: "2000"
      httpReqDurationP99Ms: "5000"
      checksRate: "0.97"
      successRate: "0.97"
      conflictRate: "0.15"
      ticketIssuedRate: "0.97"
