loadtest:
  scenario: reservation-journey-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: local-hpa-spike-scaleout-6m
  mau: ""
  stickiness: ""
  peakParticipationRate: ""
  peakWindowMinutes: 6
  journeysPerUser: 1
  safetyFactor: ""
  targetTicketsPerCustomer: 100
  calculatedJourneyRate: 50
  expectedJourneys: 13200

scaleOutReport:
  enabled: true
  pollEveryIterations: 20
  rbac:
    create: true
  targets:
    - service: auth-service
      namespace: ticketing-auth
    - service: concert-service
      namespace: ticketing-concert
    - service: notification-service
      namespace: ticketing-notification
    - service: payment-service
      namespace: ticketing-payment
    - service: reservation-service
      namespace: ticketing-reservation
    - service: ticket-service
      namespace: ticketing-ticket

dataset:
  profile: reservation-journey
  revision: reservation-local-hpa-spike-scaleout-v1
  concerts: 20
  performancesPerConcert: 3
  customerPool:
    size: 200
    revision: reservation-local-hpa-spike-scaleout-v1

manualRuns:
  dataset:
    activeDeadlineSeconds: 1800
  read:
    activeDeadlineSeconds: 1800

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "4"
    memory: 4Gi

scenarios:
  reservationJourney:
    requestPrefix: loadtest-reservation-local-hpa-spike-scaleout
    executor: ramping-arrival-rate
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 200
    maxVUs: 500
    duration: 6m
    stages:
      - duration: 1m
        target: 10
      - duration: 1m
        target: 20
      - duration: 1m
        target: 40
      - duration: 3m
        target: 50
    thinkTimeSeconds: 0
    ticketListLimit: 20
    ticketListMaxPages: 5
    activeCustomerCount: 200
    maxSeatAttempts: 3
    concertLimit: 120
    performanceLimit: 200
    seatLimit: 300
    thresholds:
      httpReqFailedRate: "0.05"
      httpReqDurationP95Ms: "2500"
      httpReqDurationP99Ms: "6000"
      checksRate: "0.95"
      successRate: "0.95"
      conflictRate: "0.20"
      ticketIssuedRate: "0.95"
