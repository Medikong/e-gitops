loadtest:
  scenario: reservation-journey-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: local-hpa-spike-3m
  mau: ""
  stickiness: ""
  peakParticipationRate: ""
  peakWindowMinutes: 3
  journeysPerUser: 1
  safetyFactor: ""
  targetTicketsPerCustomer: 100
  calculatedJourneyRate: 10
  expectedJourneys: 1260

scaleOutReport:
  enabled: true
  pollEveryIterations: 10
  rbac:
    create: true
  targets:
    - service: auth-service
      namespace: ticketing-auth
    - service: concert-service
      namespace: ticketing-concert
    - service: notification-service
      namespace: ticketing-notification
    - service: payment-service
      namespace: ticketing-payment
    - service: reservation-service
      namespace: ticketing-reservation
    - service: ticket-service
      namespace: ticketing-ticket

dataset:
  profile: reservation-journey
  revision: reservation-local-hpa-spike-v1
  concerts: 12
  performancesPerConcert: 3
  customerPool:
    size: 80
    revision: reservation-local-hpa-spike-v1

manualRuns:
  dataset:
    activeDeadlineSeconds: 1200
  read:
    activeDeadlineSeconds: 1200

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

scenarios:
  reservationJourney:
    requestPrefix: loadtest-reservation-local-hpa-spike
    executor: ramping-arrival-rate
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 60
    maxVUs: 160
    duration: 3m
    stages:
      - duration: 30s
        target: 1
      - duration: 30s
        target: 5
      - duration: 1m
        target: 10
      - duration: 1m
        target: 10
    thinkTimeSeconds: 0
    ticketListLimit: 20
    ticketListMaxPages: 5
    activeCustomerCount: 80
    maxSeatAttempts: 3
    concertLimit: 80
    performanceLimit: 120
    seatLimit: 300
    thresholds:
      httpReqFailedRate: "0.05"
      httpReqDurationP95Ms: "2500"
      httpReqDurationP99Ms: "6000"
      checksRate: "0.95"
      successRate: "0.95"
      conflictRate: "0.20"
      ticketIssuedRate: "0.95"
