apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-grafana-ingressgateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.30.0
    helm:
      releaseName: istio-grafana-ingressgateway
      values: |
        name: istio-grafana-ingressgateway
        labels:
          app: istio-grafana-ingressgateway
          istio: grafana-ingressgateway
        replicaCount: 1
        autoscaling:
          enabled: false
        service:
          type: NodePort
          ports:
            - name: status-port
              port: 15021
              protocol: TCP
              targetPort: 15021
              nodePort: 31836
            - name: http2
              port: 80
              protocol: TCP
              targetPort: 80
              nodePort: 32081
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /healthz/ready
            port: 15021
          initialDelaySeconds: 1
          periodSeconds: 2
          timeoutSeconds: 1
          failureThreshold: 30
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
