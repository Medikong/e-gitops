apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.30.0
    helm:
      releaseName: istiod
      values: |
        pilot:
          autoscaleEnabled: false
          replicaCount: 1
          nodeSelector:
            role: platform
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        meshConfig:
          accessLogFile: /dev/stdout
          extensionProviders:
            - name: medikong-authz-http
              envoyExtAuthzHttp:
                service: auth-service.dropmong-auth.svc.cluster.local
                port: 8080
                pathPrefix: /internal/session/status
                timeout: 200ms
                failOpen: false
                statusOnError: "503"
                includeRequestHeadersInCheck:
                  - authorization
                  - x-request-id
                headersToUpstreamOnAllow:
                  - x-user-id
                  - x-session-id
                  - x-token-id
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - .webhooks[]?.failurePolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
