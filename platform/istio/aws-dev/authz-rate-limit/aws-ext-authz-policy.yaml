# TEMP(2026-07-23, R24/R25 카나리/블루그린 부하테스트 기간 한정): /orders*, /payments*를
# 보호 목록에서 뺐다. dropmong-web에 실제 로그인 연동이 아직 없고, Kong도 제거된 상태라
# k6로 실제 세션을 발급받을 방법이 없어서 order-service 부하테스트가 전부 401로 막힘.
# 부하테스트(스모크/로드/스파이크, 카나리 vs 블루그린) 끝나는 대로 두 경로 원복할 것.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: medikong-aws-protected-routes
  namespace: istio-system
spec:
  selector:
    matchLabels:
      app: istio-ingressgateway
      istio: ingressgateway
  action: CUSTOM
  provider:
    name: medikong-authz-http
  rules:
    - to:
        - operation:
            paths:
              - /api/v1/users/me*
              - /v1/operator*
              - /v1/users*
              - /v1/drops*
              - /notifications*
