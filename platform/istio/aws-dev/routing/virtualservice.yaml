apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: medikong-aws-dev
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: medikong
    medikong.io/environment: aws-dev
spec:
  hosts:
    - "*"
  gateways:
    - medikong-internal
  http:
    - name: auth-debug
      match:
        - uri:
            prefix: /__debug/auth/status
      route:
        - destination:
            host: auth-service.dropmong-auth.svc.cluster.local
            port:
              number: 8080

    - name: notification-debug
      match:
        - uri:
            prefix: /__debug/notification/status
      route:
        - destination:
            host: notification-service.dropmong-notification.svc.cluster.local
            port:
              number: 8084

    - name: payment-debug
      match:
        - uri:
            prefix: /__debug/payment/status
      route:
        - destination:
            host: payment-service.dropmong-payment.svc.cluster.local
            port:
              number: 8083

    - name: user-self
      match:
        - uri:
            prefix: /api/v1/users/me
      route:
        - destination:
            host: user-service.dropmong-user.svc.cluster.local
            port:
              number: 8080

    - name: user
      match:
        - uri:
            prefix: /api/v1/users
      route:
        - destination:
            host: user-service.dropmong-user.svc.cluster.local
            port:
              number: 8080

    - name: interest-operator
      match:
        - uri:
            prefix: /v1/operator
      route:
        - destination:
            host: interest-service.dropmong-interest.svc.cluster.local
            subset: v1
            port:
              number: 8085
          weight: 100
        - destination:
            host: interest-service.dropmong-interest.svc.cluster.local
            subset: v2
            port:
              number: 8085
          weight: 0

    - name: interest-rankings
      match:
        - uri:
            prefix: /v1/rankings
      route:
        - destination:
            host: interest-service.dropmong-interest.svc.cluster.local
            subset: v1
            port:
              number: 8085
          weight: 100
        - destination:
            host: interest-service.dropmong-interest.svc.cluster.local
            subset: v2
            port:
              number: 8085
          weight: 0

    - name: interest-users
      match:
        - uri:
            prefix: /v1/users
      route:
        - destination:
            host: interest-service.dropmong-interest.svc.cluster.local
            subset: v1
            port:
              number: 8085
          weight: 100
        - destination:
            host: interest-service.dropmong-interest.svc.cluster.local
            subset: v2
            port:
              number: 8085
          weight: 0

    - name: interest-drops
      match:
        - uri:
            prefix: /v1/drops
      route:
        - destination:
            host: interest-service.dropmong-interest.svc.cluster.local
            subset: v1
            port:
              number: 8085
          weight: 100
        - destination:
            host: interest-service.dropmong-interest.svc.cluster.local
            subset: v2
            port:
              number: 8085
          weight: 0

    - name: auth
      match:
        - uri:
            prefix: /auth
      route:
        - destination:
            host: auth-service.dropmong-auth.svc.cluster.local
            port:
              number: 8080

    - name: catalog
      match:
        - uri:
            prefix: /drops
      route:
        - destination:
            host: catalog-service.dropmong-catalog.svc.cluster.local
            port:
              number: 8081

    - name: coupon
      match:
        - uri:
            prefix: /coupons
      route:
        - destination:
            host: coupon-service.dropmong-coupon.svc.cluster.local
            port:
              number: 8080

    - name: notification
      match:
        - uri:
            prefix: /notifications
      route:
        - destination:
            host: notification-service.dropmong-notification.svc.cluster.local
            port:
              number: 8084

    - name: order
      match:
        - uri:
            prefix: /orders
      route:
        # 2026-07-24: R24/R25 카나리 비교 실험(GOAL.md 9장) 개시로 90/10 활성화.
        # v2 표본이 VUS=25(게이트웨이 검증 안전선) x 10%로 적어서, 여러 라운드
        # 반복 실행해서 v2 표본을 누적시키는 방식으로 진행함(사용자 합의).
        # 실험 종료 후 100/0으로 원복 필요.
        - destination:
            host: order-service.dropmong-order.svc.cluster.local
            subset: v1
            port:
              number: 8082
          weight: 90
        - destination:
            host: order-service.dropmong-order.svc.cluster.local
            subset: v2
            port:
              number: 8082
          weight: 10

    - name: payment
      match:
        - uri:
            prefix: /payments
      route:
        - destination:
            host: payment-service.dropmong-payment.svc.cluster.local
            port:
              number: 8083

    - name: public-auth-entrypoints
      match:
        - uri:
            exact: /.well-known/jwks.json
        - uri:
            exact: /api/v1/auth/intents
        - uri:
            exact: /api/v1/auth/signins/email
      route:
        - destination:
            host: auth-service.dropmong-auth.svc.cluster.local
            port:
              number: 8080

    - name: auth-registration
      match:
        - method:
            exact: POST
          uri:
            exact: /api/v1/auth/registrations
        - method:
            exact: POST
          uri:
            regex: ^/api/v1/auth/registrations/[^/]+/challenges$
        - method:
            exact: POST
          uri:
            regex: ^/api/v1/auth/registrations/[^/]+/challenges/[^/]+/verify$
        - method:
            exact: POST
          uri:
            regex: ^/api/v1/auth/registrations/[^/]+/complete$
        - method:
            exact: GET
          uri:
            regex: ^/api/v1/auth/registrations/[^/]+$
      route:
        - destination:
            host: auth-service.dropmong-auth.svc.cluster.local
            port:
              number: 8080

    - name: development-auth-bulk-tokens
      match:
        - method:
            exact: POST
          uri:
            exact: /api/v1/dev/auth/test-tokens/bulk
          headers:
            x-dev-access-token:
              regex: ^.+$
      route:
        - destination:
            host: auth-service.dropmong-auth.svc.cluster.local
            port:
              number: 8080

    - name: synthetic-auth-virtual-message
      match:
        - method:
            exact: GET
          uri:
            regex: ^/api/v1/dev/auth/verification-messages/[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
          headers:
            x-dev-access-token:
              regex: ^.+$
      route:
        - destination:
            host: auth-service.dropmong-auth.svc.cluster.local
            port:
              number: 8080

    # Catch-all은 반드시 마지막에 둔다.
    - name: web
      match:
        - uri:
            prefix: /
      route:
        - destination:
            host: dropmong-web.dropmong-web.svc.cluster.local
            port:
              number: 80
