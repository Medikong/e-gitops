version: "3"

vars:
  NODE: '{{default "node" .NODE}}'
  KUBECTL: '{{default "kubectl" .KUBECTL}}'

tasks:
  e2e:authenticated-ingress:
    desc: local/dev 또는 aws-dev Ingress의 개발 토큰 발급과 보호 API 인증 전달을 검증합니다.
    env:
      ISTIO_E2E_ENV: '{{default "local" .ENV}}'
    cmds:
      - |
        set -eu
        environment="${ISTIO_E2E_ENV}"
        ingress_base_url="${INGRESS_BASE_URL:-}"
        case "${environment}" in
          local|dev)
            ingress_base_url="${ingress_base_url:-http://localhost}"
            ;;
          aws-dev)
            if [ -z "${ingress_base_url}" ]; then
              printf '%s\n' 'INGRESS_BASE_URL is required for ENV=aws-dev.' >&2
              exit 2
            fi
            ;;
          *)
            printf 'Unsupported ENV=%s (expected local, dev, or aws-dev).\n' "${environment}" >&2
            exit 2
            ;;
        esac

        dev_access_token="${AUTH_DEV_ACCESS_TOKEN:-}"
        if [ -z "${dev_access_token}" ]; then
          dev_access_token="$({{.KUBECTL}} get secret auth-runtime-credentials \
            -n dropmong-auth -o jsonpath='{.data.dev-access-token}' | base64 --decode)"
        fi
        if [ -z "${dev_access_token}" ]; then
          printf '%s\n' 'Auth development access token is missing.' >&2
          exit 2
        fi

        INGRESS_BASE_URL="${ingress_base_url}" \
        AUTH_DEV_ACCESS_TOKEN="${dev_access_token}" \
        {{.NODE}} tests/e2e/authenticated-ingress.mjs

  test:
    desc: Istio Ingress E2E 실행기의 로컬 계약 테스트를 실행합니다.
    cmds:
      - '{{.NODE}} --test tests/e2e/*.test.mjs'
