apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: order-service
  namespace: dropmong-order
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: medikong
    medikong.io/traffic-policy: canary
spec:
  host: order-service.dropmong-order.svc.cluster.local
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
