apiVersion: v1
kind: Service
metadata:
  name: auth-session-redis
  namespace: dropmong-auth
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: auth-session-redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-session-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-session-redis
  namespace: dropmong-auth
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: auth-session-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-session-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: medikong
        app.kubernetes.io/name: auth-session-redis
    spec:
      nodeSelector:
        medikong.io/workload: data
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.4.2-alpine
          imagePullPolicy: IfNotPresent
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
