apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
  namespace: dropmong-messaging
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: kafka
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - dropmong-payment
                  - dropmong-notification
                  - dropmong-order
                  - dropmong-interest
          podSelector:
            matchExpressions:
              - key: dropmong.io/service
                operator: In
                values:
                  - payment
                  - notification
                  - order
                  - interest
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka-create-topics
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pgadmin-runtime
  namespace: dropmong-payment
  labels:
    app.kubernetes.io/part-of: medikong
    app.kubernetes.io/name: pgadmin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - dropmong-auth
                  - dropmong-payment
                  - dropmong-coupon
                  - dropmong-order
                  - dropmong-interest
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - auth-db
                  - payment-db
                  - coupon-db
                  - order-db
                  - interest-db
      ports:
        - protocol: TCP
          port: 5432
