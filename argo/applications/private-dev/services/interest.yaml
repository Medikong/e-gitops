apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: interest-private-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/Medikong/e-gitops.git
      targetRevision: HEAD
      path: charts/medikong-service
      helm:
        releaseName: interest-private-dev
        valueFiles:
          - $values/values/base.yaml
          - $values/values/env/private-dev.yaml
          - $values/values/services/interest.yaml
          - $values/values/services/private-dev/interest.yaml
          - $values/values/overrides/private-dev-ha-stable.yaml
    - repoURL: https://github.com/Medikong/e-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dropmong-interest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
