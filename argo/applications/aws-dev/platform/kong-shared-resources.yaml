apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-shared-resources-aws-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-24"
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/e-gitops.git
    targetRevision: HEAD
    path: platform/kong-overlays/aws-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dropmong-auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
