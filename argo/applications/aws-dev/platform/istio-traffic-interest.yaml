apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: interest-traffic
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/e-gitops.git
    targetRevision: HEAD
    path: platform/istio/traffic/interest
  destination:
    server: https://kubernetes.default.svc
    namespace: dropmong-interest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=false
      - SkipDryRunOnMissingResource=true
