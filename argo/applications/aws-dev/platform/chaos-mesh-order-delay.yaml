apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chaos-mesh-order-delay-aws-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    medikong.io/manual-sync-required: "replace-exact-pod-names-and-run-preflight"
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/e-gitops.git
    targetRevision: HEAD
    path: platform/chaos-mesh/experiments/aws-dev/ingressgateway-to-order-v1
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
