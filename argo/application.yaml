apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medical-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/gitops.git
    targetRevision: HEAD
    path: k8s/overlays/aws/all
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
