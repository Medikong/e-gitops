app:
  name: interest-service
  namespace: dropmong-interest
  labels:
    dropmong.io/service: interest
    dropmong.io/tier: api

image:
  repository: interest-service
  tag: ""

  digest: "sha256:cbc7ea2145827a358eeaac7fa585d01b34bb482034a975c81c84dae26c6add65"
  version: "v0.1.1"
deployment:
  replicas: 1

container:
  port: 8085
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@interest-db:5432/interest_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.dropmong-messaging.svc.cluster.local:9092
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

service:
  port: 8085
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: interest-customer-api
      annotations:
        konghq.com/plugins: dropmong-jwt,dropmong-identity-headers,dropmong-role-customer,dropmong-correlation-id,dropmong-prometheus
      hosts:
        - host: ""
          paths:
            - path: /v1/users
              pathType: Prefix
            - path: /v1/drops
              pathType: Prefix
    - name: interest-public-api
      annotations:
        konghq.com/plugins: dropmong-correlation-id,dropmong-prometheus
      hosts:
        - host: ""
          paths:
            - path: /v1/rankings
              pathType: Prefix
    - name: interest-operator-api
      annotations:
        konghq.com/plugins: dropmong-jwt,dropmong-identity-headers,dropmong-correlation-id,dropmong-prometheus
      hosts:
        - host: ""
          paths:
            - path: /v1/operator
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8085
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: interest-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dropmong-messaging
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318

nodeSelector:
  medikong.io/workload: app
