app:
  name: catalog-service
  namespace: dropmong-catalog
  labels:
    dropmong.io/service: catalog
    dropmong.io/tier: api

image:
  repository: catalog-service
  tag: ""

  digest: "sha256:93557317a32b1b34686a879b41e53bae8cfc4e62f646d89400f0f06122a5965e"
  version: "v0.1.3"
database:
  sqlalchemy:
    enabled: false

deployment:
  replicas: 2

container:
  port: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    - name: DATABASE_URL
      value: postgresql+asyncpg://user:password@catalog-db:5432/catalog_db
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

migration:
  enabled: true
  command:
    - python
    - -m
    - app.migrations
  args:
    - upgrade
  env:
    - name: DATABASE_URL
      value: postgresql+asyncpg://user:password@catalog-db:5432/catalog_db

service:
  port: 8081
  targetPort: http

ingress:
  enabled: false

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: catalog-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318

nodeSelector:
  medikong.io/workload: app

observability:
  profiling:
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040
