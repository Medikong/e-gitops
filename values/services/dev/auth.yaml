container:
  env:
    - name: DATABASE_URL
      value: postgres://user:password@auth-db:5432/auth_db?sslmode=disable
    - name: AUTH_TOKEN_TTL_SECONDS
      value: "900"
    - name: AUTH_REFRESH_TOKEN_TTL_SECONDS
      value: "604800"
    - name: AUTH_JWT_PRIVATE_KEY_PEM
      valueFrom:
        secretKeyRef:
          name: auth-dev-jwt
          key: jwt-private-key-pem
    - name: AUTH_JWT_KEY_ID
      valueFrom:
        secretKeyRef:
          name: auth-dev-jwt
          key: jwt-key-id
    - name: AUTH_JWT_ISSUER
      valueFrom:
        secretKeyRef:
          name: auth-dev-jwt
          key: jwt-issuer
    - name: AUTH_JWT_AUDIENCES
      value: dropmong-api
    - name: AUTH_DEV_TEST_TOKEN_ENABLED
      value: "true"
  resources:
    requests:
      cpu: 300m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 384Mi
