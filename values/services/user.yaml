app:
  name: user-service
  namespace: dropmong-user
  labels:
    dropmong.io/service: user
    dropmong.io/tier: api

image:
  repository: user-service
  tag: ""

  digest: "sha256:3c77517be09477c87295908894e9d30bc2b10e83f6c03128d0cf1a794efe74ea"
  version: "v0.1.3"
database:
  sqlalchemy:
    enabled: false

deployment:
  replicas: 1

container:
  ports:
    - name: http
      containerPort: 8080
    - name: admin
      containerPort: 9090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@user-db:5432/user_db
    - name: USER_ALLOWED_ORIGINS
      value: https://user.dropmong.internal
    # USER_SIGNING_PRIVATE_KEY through USER_PRIVATE_NAME_ENCRYPTION_KEY:
    # sourced from the user-runtime-credentials Secret (openssl-generated
    # placeholder keys via `task aws-dev:secrets`, see infra repo). Real
    # keys/rotation still owned by user-service - replace before this is
    # used for anything beyond internal dev testing.
    - name: USER_SIGNING_PRIVATE_KEY
      valueFrom:
        secretKeyRef:
          name: user-runtime-credentials
          key: user-signing-private-key
    - name: USER_SIGNING_KEY_ID
      valueFrom:
        secretKeyRef:
          name: user-runtime-credentials
          key: user-signing-key-id
    - name: AUTH_PROOF_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: user-runtime-credentials
          key: auth-proof-public-key
    - name: AUTH_PROOF_KEY_ID
      valueFrom:
        secretKeyRef:
          name: user-runtime-credentials
          key: auth-proof-key-id
    - name: MEDIA_PROOF_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: user-runtime-credentials
          key: media-proof-public-key
    - name: MEDIA_PROOF_KEY_ID
      valueFrom:
        secretKeyRef:
          name: user-runtime-credentials
          key: media-proof-key-id
    - name: USER_PRIVATE_NAME_ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: user-runtime-credentials
          key: private-name-encryption-key
  readinessProbe:
    httpGet:
      path: /readyz
      port: admin
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: admin
    initialDelaySeconds: 10
    periodSeconds: 10

migration:
  enabled: true
  command:
    - /app/migrate
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@user-db:5432/user_db
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  port: 8080
  targetPort: http
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: admin
      port: 9090
      targetPort: admin

ingress:
  enabled: true
  className: kong
  objects:
    - name: user-registration-api
      annotations:
        konghq.com/plugins: dropmong-correlation-id,dropmong-prometheus
        konghq.com/strip-path: "false"
      hosts:
        - host: ""
          paths:
            - path: /api/v1/users
              pathType: Exact
    - name: user-self-api
      annotations:
        konghq.com/plugins: dropmong-correlation-id,dropmong-prometheus,dropmong-jwt
        konghq.com/strip-path: "false"
      hosts:
        - host: ""
          paths:
            - path: /api/v1/users/me
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080

    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istio-ingressgateway
              istio: ingressgateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: user-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istiod
      ports:
        - protocol: TCP
          port: 15012
        - protocol: TCP
          port: 15010
        - protocol: TCP
          port: 443
nodeSelector:
  medikong.io/workload: app

observability:
  profiling:
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040

serviceMonitor:
  port: admin
  path: /metrics
  networkPolicy:
    port: 9090
