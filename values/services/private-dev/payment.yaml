container:
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-payment-credentials
          key: database-url
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.dropmong-messaging.svc.cluster.local:9092
    - name: PAYMENT_APPROVED_TOPIC
      value: payment-approved
    - name: PAYMENT_FAILED_TOPIC
      value: payment-failed

migration:
  enabled: true
  command:
    - alembic
    - upgrade
    - head
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-payment-credentials
          key: database-url
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

networkPolicy:
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istio-ingressgateway
              istio: ingressgateway
      ports:
        - protocol: TCP
          port: 8083

deployment:
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 50m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 300m
    sidecar.istio.io/proxyMemoryLimit: 256Mi
