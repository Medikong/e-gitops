container:
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-user-credentials
          key: database-url
    - name: USER_ALLOWED_ORIGINS
      value: https://user.dropmong.internal

ingress:
  enabled: false

migration:
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-user-credentials
          key: database-url
