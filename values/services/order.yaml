app:
  name: order-service
  namespace: dropmong-order
  labels:
    dropmong.io/service: order
    dropmong.io/tier: api

image:
  repository: order-service
  tag: ""

  digest: "sha256:32500a840f12387480eb3f4c93df6aecf3cc87a03e13ee44397fbe3a9364100d"
  version: "v0.1.2"
deployment:
  replicas: 1

container:
  port: 8082
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@order-db:5432/order_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.ticketing-messaging.svc.cluster.local:9092
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

service:
  port: 8082
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: order-customer-api
      annotations:
        konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-customer,ticketing-rate-limit-orders,ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /orders
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8082
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ticketing-messaging
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318

nodeSelector:
  medikong.io/workload: app
