app:
  name: coupon-service
  namespace: dropmong-coupon
  labels:
    dropmong.io/service: coupon
    dropmong.io/tier: api

image:
  repository: coupon-service
  tag: ""

  digest: "sha256:a3cd43357ea1d83dcfb5d0ec92766c3ebbdd28112fbb6553e640f6196b97e0a2"
  version: "v0.1.3"
database:
  sqlalchemy:
    enabled: false

deployment:
  replicas: 1

container:
  ports:
    - name: http
      containerPort: 8080
    - name: admin
      containerPort: 9090
  readinessProbe:
    httpGet:
      path: /readyz
      port: admin
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: admin
    initialDelaySeconds: 10
    periodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    - name: DATABASE_URL
      value: postgres://user:password@coupon-db:5432/coupon_db?sslmode=disable
    - name: COUPON_ALLOWED_ORIGINS
      value: http://localhost:3000
    - name: COUPON_CODE_HASH_KEY
      value: dropmong-dev-coupon-code-hash-key-change-before-shared-use
    - name: COUPON_REDEMPTION_RESERVATION_TTL
      value: 15m
    - name: COUPON_CODE_RESERVATION_TTL
      value: 15m
    - name: COUPON_COMMAND_LEASE
      value: 30s
    - name: COUPON_IDEMPOTENCY_TTL
      value: 24h

migration:
  enabled: true
  command:
    - /app/migrate
  env:
    - name: DATABASE_URL
      value: postgres://user:password@coupon-db:5432/coupon_db?sslmode=disable

workers:
  - name: worker
    replicas: 1
    command: ["/app/worker"]

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: coupon-api
      annotations:
        konghq.com/plugins: dropmong-correlation-id,dropmong-prometheus
      hosts:
        - host: ""
          paths:
            - path: /coupons
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: coupon-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: coupon-redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istiod
      ports:
        - protocol: TCP
          port: 15012
        - protocol: TCP
          port: 15010
        - protocol: TCP
          port: 443
nodeSelector:
  medikong.io/workload: app
