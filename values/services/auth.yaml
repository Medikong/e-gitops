app:
  name: auth-service
  namespace: dropmong-auth
  labels:
    dropmong.io/service: auth
    dropmong.io/tier: api

image:
  repository: auth-service
  tag: v0.9.12

database:
  sqlalchemy:
    enabled: false

deployment:
  replicas: 3

container:
  ports:
    - name: http
      containerPort: 8080
    - name: admin
      containerPort: 9090
  resources:
    requests:
      cpu: 1000m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 768Mi
  env:
    - name: DATABASE_URL
      value: postgres://user:password@auth-db:5432/auth_db?sslmode=disable
    - name: AUDIT_SINK_DATABASE_URL
      value: postgres://user:password@auth-db:5432/auth_db?sslmode=disable
    - name: AUTH_JWT_SECRET
      value: dropmong-dev-jwt-secret-change-before-shared-use
    - name: AUTH_JWT_ISSUER
      value: auth-service
    - name: AUTH_CREDENTIAL_HMAC_KEY
      value: dropmong-dev-credential-hmac-key-change-before-shared-use
    - name: AUTH_REPLAY_ENCRYPTION_KEY
      value: dropmong-dev-replay-key-32-bytes!
  readinessProbe:
    httpGet:
      path: /readyz
      port: admin
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: admin
    initialDelaySeconds: 10
    periodSeconds: 10

workers:
  - name: worker
    replicas: 1
    command: ["/app/worker"]

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: auth-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /auth
              pathType: Prefix
    - name: auth-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/auth/status
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
nodeSelector:
  medikong.io/workload: app
observability:
  profiling:
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040
