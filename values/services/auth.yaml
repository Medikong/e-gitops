app:
  name: auth-service
  namespace: dropmong-auth
  labels:
    dropmong.io/service: auth
    dropmong.io/tier: api

image:
  repository: auth-service
  tag: v0.9.12

database:
  sqlalchemy:
    enabled: false

deployment:
  replicas: 3

container:
  ports:
    - name: http
      containerPort: 8080
    - name: admin
      containerPort: 9090
  resources:
    requests:
      cpu: 1000m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 768Mi
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-auth-credentials
          key: database-url
    - name: AUDIT_SINK_DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: postgres-auth-credentials
          key: database-url
    - name: AUTH_JWT_PRIVATE_KEY_PEM
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: jwt-private-key-pem
    - name: AUTH_JWT_KEY_ID
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: jwt-key-id
    - name: AUTH_JWT_ISSUER
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: jwt-issuer
    - name: AUTH_JWT_AUDIENCES
      value: dropmong-api
    - name: AUTH_CREDENTIAL_HMAC_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: credential-hmac-key
    - name: AUTH_REPLAY_ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: replay-encryption-key
    - name: AUTH_PROOF_PRIVATE_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: auth-proof-private-key
    - name: AUTH_PROOF_KEY_ID
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: auth-proof-key-id
    - name: AUTH_USER_PROOF_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: user-proof-public-key
    - name: AUTH_USER_PROOF_KEY_ID
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: user-proof-key-id
    - name: AUTH_USER_PROOF_ISSUER
      value: user-service
    - name: AUTH_ALLOWED_ORIGINS
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: allowed-origins
    - name: AUTH_COOKIE_SECURE
      value: "true"
    - name: AUTH_DEVELOPMENT_ENABLED
      value: "false"
    - name: AUTH_DEV_ROUTE_ENABLED
      value: "false"
    - name: AUTH_VIRTUAL_ADAPTERS_ENABLED
      value: "false"
    - name: AUTH_SESSION_STATUS_ENABLED
      value: "false"
    - name: AUTH_SESSION_STATUS_TIMEOUT
      value: 200ms
    - name: AUTH_SESSION_STATUS_DB_TIMEOUT
      value: 100ms
    - name: AUTH_SESSION_STATUS_CACHE_TTL
      value: 5m
    - name: AUTH_SESSION_STATUS_TOMBSTONE_TTL
      value: 20m
  readinessProbe:
    httpGet:
      path: /readyz
      port: admin
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /healthz
      port: admin
    initialDelaySeconds: 10
    periodSeconds: 10

workers:
  - name: worker
    replicas: 1
    command: ["/app/worker"]

service:
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: kong
  objects:
    - name: auth-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /auth
              pathType: Prefix
    - name: auth-debug-api
      annotations:
        konghq.com/plugins: ticketing-correlation-id,ticketing-prometheus
      hosts:
        - host: ""
          paths:
            - path: /__debug/auth/status
              pathType: Prefix

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istio-ingressgateway
              istio: ingressgateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
nodeSelector:
  medikong.io/workload: app
observability:
  profiling:
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040
