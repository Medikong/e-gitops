deployment:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

canary:
  enabled: false

container:
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 750m
      memory: 512Mi

migration:
  enabled: true
  command:
    - python
    - -m
    - app.migrations
    - upgrade
  env:
    - name: DATABASE_URL
      value: postgresql+asyncpg://user:password@catalog-db:5432/catalog_db
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

pdb:
  enabled: false
