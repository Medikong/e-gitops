deployment:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

canary:
  enabled: false

container:
  resources:
    # TODO(운영 전환 시 재활성화, 2026-07-20 팀 합의): 개발단계엔 스케줄링 유연성
    # 우선으로 CPU request/limit 비활성화. requests.cpu는 실측 기준 100m로 통일.
    # requests:
    #   cpu: 100m
    requests: null
    limits:
      cpu: null
      memory: 512Mi

migration:
  enabled: true
  command:
    - python
    - -m
    - app.migrations
    - upgrade
  env:
    - name: DATABASE_URL
      value: postgresql+asyncpg://user:password@catalog-db:5432/catalog_db
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

pdb:
  enabled: false
