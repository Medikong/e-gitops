deployment:
  podLabels:
    sidecar.istio.io/inject: "true"
    version: v1
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

# 카나리 실험용. 트래픽 분배(subset/weight) 배선은 v1과 동일 이미지로 이미 검증 완료.
# 2026-07-22: 실제로 다른 버전이 떠도 정상 동작하는지 검증하기 위해 v2에 이전
# ECR 태그(v0.1.2)를 지정. SERVICE_VERSION env는 image.tag를 그대로 반영하므로
# (charts/medikong-service/templates/_helpers.tpl의 imageVersion 참고) 코드 변경 없이도
# v1(v0.2.0)과 v2(v0.1.2)가 /openapi.json의 info.version으로 구분됨.
canary:
  enabled: true
  version: v2
  replicas: 1
  image:
    tag: v0.1.2
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  resources:
    # TODO(운영 전환 시 재활성화, 2026-07-20 팀 합의): 개발단계엔 스케줄링 유연성
    # 우선으로 CPU request/limit 비활성화. requests.cpu는 실측 기준 100m로 통일.
    # requests:
    #   cpu: 100m
    # memory.limit이 null이 아니면 K8s가 memory request를 limit과 동일하게 자동 설정함
    # (requests: null이어도 마찬가지) — 실측 사용량(2026-07-22, Prometheus
    # container_memory_working_set_bytes 최대치 약 85Mi) 대비 768Mi는 과도하게
    # 예약되고 있었음. 카나리 실험(v1+v2 동시 기동)에 필요한 스케줄링 여유 확보 위해
    # 실측치의 약 3배 여유를 두고 256Mi로 낮춤.
    requests: null
    limits:
      cpu: null
      memory: 256Mi

database:
  sqlalchemy:
    poolSize: 10
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

pdb:
  enabled: false
