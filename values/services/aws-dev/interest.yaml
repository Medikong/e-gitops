deployment:
  podLabels:
    sidecar.istio.io/inject: "true"
    version: v1
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

# 카나리 실험용. 처음엔 v1과 동일 이미지로 라우팅 배선(subset/weight)만 검증하고,
# 실제 신버전으로 테스트할 때 canary.image.tag를 새 버전으로 지정한다.
canary:
  enabled: true
  version: v2
  replicas: 1
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  resources:
    # TODO(운영 전환 시 재활성화, 2026-07-20 팀 합의): 개발단계엔 스케줄링 유연성
    # 우선으로 CPU request/limit 비활성화. requests.cpu는 실측 기준 100m로 통일.
    # requests:
    #   cpu: 100m
    # memory.limit이 null이 아니면 K8s가 memory request를 limit과 동일하게 자동 설정함
    # (requests: null이어도 마찬가지) — 실측 사용량(2026-07-22, Prometheus
    # container_memory_working_set_bytes 최대치 약 85Mi) 대비 768Mi는 과도하게
    # 예약되고 있었음. 카나리 실험(v1+v2 동시 기동)에 필요한 스케줄링 여유 확보 위해
    # 실측치의 약 3배 여유를 두고 256Mi로 낮춤.
    requests: null
    limits:
      cpu: null
      memory: 256Mi

database:
  sqlalchemy:
    poolSize: 10
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

pdb:
  enabled: false
