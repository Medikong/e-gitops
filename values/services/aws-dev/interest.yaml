deployment:
  podLabels:
    sidecar.istio.io/inject: "true"
    version: v1
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

# 카나리/블루그린 배포전략 비교 실험용 (2026-07-22).
# base(v1)는 v0.2.1(정상)에 고정. v2엔 experiment/interest-service-synthetic-regression
# 브랜치에서 빌드한 v0.2.2를 지정 — /v1/rankings/drops/trending에 +500ms 지연과
# 20% 500 에러를 인위적으로 심어놓은 버전. main엔 merge 안 된 실험 코드이며,
# 카나리/블루그린이 실제 회귀를 얼마나 빨리·적게 노출시키는지 수치로 비교하기 위함.
canary:
  enabled: true
  version: v2
  replicas: 1
  image:
    tag: v0.2.2
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  resources:
    # TODO(운영 전환 시 재활성화, 2026-07-20 팀 합의): 개발단계엔 스케줄링 유연성
    # 우선으로 CPU request/limit 비활성화. requests.cpu는 실측 기준 100m로 통일.
    # requests:
    #   cpu: 100m
    # memory.limit이 null이 아니면 K8s가 memory request를 limit과 동일하게 자동 설정함
    # (requests: null이어도 마찬가지) — 실측 사용량(2026-07-22, Prometheus
    # container_memory_working_set_bytes 최대치 약 85Mi) 대비 768Mi는 과도하게
    # 예약되고 있었음. 카나리 실험(v1+v2 동시 기동)에 필요한 스케줄링 여유 확보 위해
    # 실측치의 약 3배 여유를 두고 256Mi로 낮춤.
    requests: null
    limits:
      cpu: null
      memory: 256Mi

database:
  sqlalchemy:
    poolSize: 10
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

pdb:
  enabled: false
