deployment:
  podLabels:
    sidecar.istio.io/inject: "true"
    version: v1
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

# 카나리 실험용. 처음엔 v1과 동일 이미지로 라우팅 배선(subset/weight)만 검증하고,
# 실제 신버전으로 테스트할 때 canary.image.tag를 새 버전으로 지정한다.
canary:
  enabled: true
  version: v2
  replicas: 1
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  resources:
    # TODO(운영 전환 시 재활성화, 2026-07-20 팀 합의): 개발단계엔 스케줄링 유연성
    # 우선으로 CPU request/limit 비활성화. requests.cpu는 실측 기준 100m로 통일.
    # requests:
    #   cpu: 100m
    requests: null
    limits:
      cpu: null
      memory: 768Mi

database:
  sqlalchemy:
    poolSize: 10
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

pdb:
  enabled: false
