deployment:
  podLabels:
    sidecar.istio.io/inject: "true"
    version: v1
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

# 카나리/블루그린 배포전략 비교 실험용 (2026-07-22~23, R24/R25 — 서비스 선정 근거는
# Deployment-analysis.md 참고: order-service는 재고 오버셀 방지 로직이 실제로 있고
# GOAL.md 핵심 과제와 직결돼서 interest-service 다음 대상으로 선정함).
# 1단계(완료): base(v1)와 동일한 v0.1.2를 v2에도 지정해서 배선 자체 검증 완료.
# 2단계(지금): experiment/order-service-synthetic-regression 브랜치에서 빌드한
# v0.1.3(오버셀 유발 버그: _locked_inventory()의 FOR UPDATE 락을 env var로 우회)으로
# 교체. SYNTHETIC_REGRESSION_SKIP_LOCK=true로 버그를 켜고, DELAY_SECONDS로 레이스
# 윈도우를 넓힘 — 두 값 다 기본값(false/0)이 안전이라 base(v1)엔 영향 없음.
# charts/medikong-service/templates/deployment-canary.yaml + values.yaml에
# canary.env 오버라이드를 신규 추가해서(이전엔 없었음) 이 배선이 가능해짐.
canary:
  enabled: true
  version: v2
  replicas: 1
  image:
    tag: v0.1.5
  env:
    - name: SYNTHETIC_REGRESSION_SKIP_LOCK
      value: "true"
    - name: SYNTHETIC_REGRESSION_DELAY_SECONDS
      value: "0.3"
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi

container:
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@order-db:5432/order_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      value: kafka.dropmong-messaging.svc.cluster.local:9092
    - name: ORDER_EXTRA_PRODUCTS_JSON
      value: >-
        [{"drop_id":"opaque-drop-45faeaea","product_id":"opaque-product-45faeaea","unit_price":50000},{"drop_id":"opaque-drop-45faeaea","product_id":"opaque-product-s06-45faeaea","unit_price":50000}]
  resources:
    # TODO(운영 전환 시 재활성화, 2026-07-20 팀 합의): 개발단계엔 스케줄링 유연성
    # 우선으로 CPU request/limit 비활성화. requests.cpu는 실측 기준 100m로 통일.
    # requests:
    #   cpu: 100m
    # 2026-07-22: Prometheus 실측 기준 실사용 약 109Mi — 실측치의 약 3배 여유로 재조정.
    # ⚠️ 부하테스트(GOAL.md 9장) 전에 반드시 재검토 — idle 트래픽 기준 값임.
    requests: null
    limits:
      cpu: null
      memory: 384Mi

migration:
  enabled: true
  command:
    - python
    - -m
    - app.migrate
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@order-db:5432/order_db
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

database:
  sqlalchemy:
    poolSize: 10
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

pdb:
  enabled: false
