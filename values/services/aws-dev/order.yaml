deployment:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

canary:
  enabled: false

container:
  resources:
    requests:
      cpu: 400m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi

migration:
  enabled: true
  command:
    - python
    - -m
    - app.migrate
    - upgrade
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@order-db:5432/order_db
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

database:
  sqlalchemy:
    poolSize: 10
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

pdb:
  enabled: false
