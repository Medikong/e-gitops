deployment:
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

canary:
  enabled: false

container:
  resources:
    # TODO(운영 전환 시 재활성화, 2026-07-20 팀 합의): 개발단계엔 스케줄링 유연성
    # 우선으로 CPU request/limit 비활성화. requests.cpu는 실측 기준 100m로 통일.
    # requests:
    #   cpu: 100m
    requests: null
    limits:
      cpu: null
      memory: 768Mi

migration:
  enabled: true
  command:
    - python
    - -m
    - app.migrate
    - upgrade
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@order-db:5432/order_db
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

database:
  sqlalchemy:
    poolSize: 10
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

pdb:
  enabled: false
