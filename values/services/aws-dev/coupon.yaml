deployment:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

canary:
  enabled: false

container:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 750m
      memory: 512Mi

migration:
  enabled: true
  command:
    - /app/migrate
  env:
    - name: DATABASE_URL
      value: postgres://user:password@coupon-db:5432/coupon_db?sslmode=disable
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

pdb:
  enabled: false
