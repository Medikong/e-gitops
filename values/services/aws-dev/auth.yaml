deployment:
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/proxyCPU: 25m
    sidecar.istio.io/proxyMemory: 64Mi
    sidecar.istio.io/proxyCPULimit: 200m
    sidecar.istio.io/proxyMemoryLimit: 256Mi
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

canary:
  enabled: false

container:
  # auth-service only permits virtual adapters in a development runtime.
  # Kubernetes workload labels remain aws-dev; this overrides only
  # SERVICE_ENVIRONMENT inside the auth server and inherited worker.
  serviceEnvironment: development
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@auth-db:5432/auth_db
    - name: AUDIT_SINK_DATABASE_URL
      value: postgresql+psycopg://user:password@auth-db:5432/auth_db
    - name: AUTH_TOKEN_TTL_SECONDS
      value: "7200"
    - name: AUTH_REFRESH_TOKEN_TTL_SECONDS
      value: "604800"
    # AUTH_JWT_PRIVATE_KEY_PEM through AUTH_ALLOWED_ORIGINS: sourced from the
    # auth-runtime-credentials Secret (openssl-generated placeholder keys via
    # `task aws-dev:secrets`, see infra/.../aws-dev/playbooks/secrets.yml).
    # Real keys/origin still owned by auth-service - replace before this is
    # used for anything beyond internal dev testing.
    - name: AUTH_JWT_PRIVATE_KEY_PEM
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: jwt-private-key-pem
    - name: AUTH_JWT_KEY_ID
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: jwt-key-id
    - name: AUTH_JWT_ISSUER
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: jwt-issuer
    - name: AUTH_JWT_AUDIENCES
      value: dropmong-api
    - name: AUTH_CREDENTIAL_HMAC_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: credential-hmac-key
    - name: AUTH_REPLAY_ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: replay-encryption-key
    - name: AUTH_PROOF_PRIVATE_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: auth-proof-private-key
    - name: AUTH_PROOF_KEY_ID
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: auth-proof-key-id
    - name: AUTH_USER_PROOF_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: user-proof-public-key
    - name: AUTH_USER_PROOF_KEY_ID
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: user-proof-key-id
    - name: AUTH_USER_PROOF_ISSUER
      value: user-service
    - name: AUTH_ALLOWED_ORIGINS
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: allowed-origins
    - name: AUTH_COOKIE_SECURE
      value: "true"
    - name: AUTH_DEVELOPMENT_ENABLED
      value: "true"
    - name: AUTH_DEV_ROUTE_ENABLED
      value: "true"
    - name: AUTH_VIRTUAL_ADAPTERS_ENABLED
      value: "true"
    # Runtime prerequisite: add these keys to the existing Secret without
    # committing or logging their values. The synthetic client receives the
    # matching access token and account credentials through a separate
    # operator-controlled runtime channel.
    - name: AUTH_DEV_ACCESS_TOKEN
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: dev-access-token
    - name: AUTH_VIRTUAL_MESSAGE_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: virtual-message-key
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: auth-valkey-credentials
          key: redis-url
    - name: AUTH_SESSION_STATUS_ENABLED
      value: "true"
    - name: AUTH_SESSION_STATUS_TIMEOUT
      value: 200ms
    - name: AUTH_SESSION_STATUS_DB_TIMEOUT
      value: 100ms
    - name: AUTH_SESSION_STATUS_CACHE_TTL
      value: 5m
    - name: AUTH_SESSION_STATUS_TOMBSTONE_TTL
      value: 20m
  resources:
    # TODO(운영 전환 시 재활성화, 2026-07-20 팀 합의): 개발단계엔 스케줄링 유연성
    # 우선으로 CPU request/limit 비활성화. requests.cpu는 실측 기준 100m로 통일.
    # requests:
    #   cpu: 100m
    # 2026-07-22: Prometheus 실측(container_memory_working_set_bytes) 기준
    # auth-service/worker 실사용 약 5~11Mi인데 768Mi로 예약돼있어 노드 스케줄링을
    # 막고 있었음 — 실측치의 약 6배 여유로 재조정. 이 값은 worker Deployment에도
    # 그대로 적용됨(worker.resources가 기본으로 이 값을 상속).
    # ⚠️ 부하테스트(GOAL.md 9장) 전에 반드시 재검토 — 동시 요청 증가 시 이 여유로
    # 부족할 수 있음, idle 트래픽 기준으로 잡은 값임.
    requests: null
    limits:
      cpu: null
      memory: 64Mi

migration:
  enabled: true
  command:
    - /app/migrate
  env:
    - name: DATABASE_URL
      value: postgresql+psycopg://user:password@auth-db:5432/auth_db
    - name: AUDIT_SINK_DATABASE_URL
      value: postgresql+psycopg://user:password@auth-db:5432/auth_db
    - name: SERVICE_ENVIRONMENT
      value: development
    - name: AUTH_DEVELOPMENT_ENABLED
      value: "true"
    - name: AUTH_DEV_ROUTE_ENABLED
      value: "true"
    - name: AUTH_VIRTUAL_ADAPTERS_ENABLED
      value: "true"
    - name: AUTH_DEV_ACCESS_TOKEN
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: dev-access-token
    - name: AUTH_VIRTUAL_MESSAGE_KEY
      valueFrom:
        secretKeyRef:
          name: auth-runtime-credentials
          key: virtual-message-key
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

database:
  sqlalchemy:
    poolSize: 10
    maxOverflow: 0
    poolTimeoutSeconds: 15
    poolRecycleSeconds: 1800

networkPolicy:
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-valkey
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istiod
      ports:
        - protocol: TCP
          port: 15012
        - protocol: TCP
          port: 15010
        - protocol: TCP
          port: 443

pdb:
  enabled: false

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
