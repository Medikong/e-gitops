environment: local-capacity-baseline

nodeSelector: null

image:
  registry: localhost:5001
  tag: dev
  pullPolicy: Always

deployment:
  replicasManaged: false
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

container:
  resources:
    requests:
      # dev:loadtest overrides this from the selected capacity baseline preset.
      cpu: 1000m
      memory: 128Mi
    limits:
      memory: 512Mi

observability:
  tracing:
    enabled: true
    otlpEndpoint: http://opentelemetry-collector.observability.svc.cluster.local:4317
    excludedUrls: /health,/healthz,/readyz,/metrics
  profiling:
    enabled: true
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040
    sampleRate: 25
    spanProfilesEnabled: true

pdb:
  enabled: false

hpa:
  enabled: false

serviceMonitor:
  enabled: true
